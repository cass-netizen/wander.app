<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wander — Audio History Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --bg: #0d0f14;
    --bg-elev: #161a22;
    --bg-card: #1b202b;
    --border: #2a3040;
    --accent: #ff8a5c;
    --accent-2: #ffb648;
    --accent-soft: rgba(255, 138, 92, 0.14);
    --text: #f2f0ea;
    --text-dim: #9aa1b0;
    --text-faint: #626a7a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 20px 16px;
    background: linear-gradient(160deg, #1a1420 0%, #12141c 60%, #0d0f14 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute;
    top: -60px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  header p {
    margin: 5px 0 0;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  #map {
    flex: 0 0 240px;
    min-height: 200px;
    filter: saturate(0.9);
  }

  #status {
    padding: 9px 20px;
    font-size: 12.5px;
    color: var(--text-dim);
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #status.active::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 6px var(--accent-2);
    flex-shrink: 0;
  }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 32px;
    background: var(--bg);
  }

  .place {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }
  .place:active { transform: scale(0.99); }

  .place-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .place h2 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16.5px;
    line-height: 1.3;
    color: var(--text);
  }
  .place .dist {
    flex-shrink: 0;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent-2);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .place p.summary {
    margin: 0 0 14px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-dim);
  }

  .buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    border: none;
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  button:active { transform: scale(0.96); }
  .listenBtn {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #1a1108;
  }
  .stopBtn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .streetBtn {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  #locateBtn {
    position: fixed;
    top: 158px;
    right: 16px;
    z-index: 500;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    padding: 0;
    font-size: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .leaflet-popup-content-wrapper {
    background: var(--bg-card);
    color: var(--text);
    border-radius: 10px;
  }
  .leaflet-popup-tip { background: var(--bg-card); }
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>Wander</h1>
  <p>Point yourself somewhere new — hear the history, see the street.</p>
</header>

<div id="map"></div>
<button id="locateBtn" title="Re-center on me">📍</button>
<div id="status">Waiting for location…</div>
<div id="list"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const statusEl = document.getElementById('status');
const listEl = document.getElementById('list');
let map, userMarker;

// --- Map setup ---
function initMap(lat, lon) {
  map = L.map('map', { zoomControl: false }).setView([lat, lon], 16);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  userMarker = L.circleMarker([lat, lon], {
    radius: 8, color: '#ff8a5c', fillColor: '#ff8a5c', fillOpacity: 1, weight: 2
  }).addTo(map).bindPopup('You are here');
}

// --- Distance helper (meters) ---
function distMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// --- Wikipedia: find nearby geotagged pages ---
async function findNearbyPlaces(lat, lon) {
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=2000&gslimit=15&format=json&origin=*`;
  const res = await fetch(url);
  const data = await res.json();
  return data.query.geosearch;
}

// --- Wikipedia: get a plain-text summary for a page ---
async function getSummary(title) {
  const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  return data.extract || null;
}

// --- Google Street View link (no API key needed) ---
function streetViewUrl(lat, lon) {
  return `https://www.google.com/maps?layer=c&cbll=${lat},${lon}`;
}

function speak(text, btn, allButtons) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95;
  allButtons.forEach(b => b.textContent = '▶ Listen');
  btn.textContent = '⏸ Playing…';
  utter.onend = () => { btn.textContent = '▶ Listen'; };
  window.speechSynthesis.speak(utter);
}

async function renderPlaces(lat, lon) {
  statusEl.textContent = 'Searching nearby history…';
  statusEl.classList.add('active');
  let places;
  try {
    places = await findNearbyPlaces(lat, lon);
  } catch (e) {
    statusEl.textContent = 'Could not reach Wikipedia. Check your connection.';
    statusEl.classList.remove('active');
    return;
  }

  if (!places.length) {
    statusEl.textContent = 'Nothing notable found within 2km. Try moving around.';
    statusEl.classList.remove('active');
    listEl.innerHTML = '';
    return;
  }

  statusEl.textContent = `Found ${places.length} nearby places`;
  listEl.innerHTML = '';
  const allButtons = [];

  for (const place of places) {
    const d = Math.round(distMeters(lat, lon, place.lat, place.lon));

    const marker = L.marker([place.lat, place.lon]).addTo(map).bindPopup(place.title);

    const card = document.createElement('div');
    card.className = 'place';
    card.innerHTML = `
      <div class="place-head">
        <h2>${place.title}</h2>
        <span class="dist">${d} m</span>
      </div>
      <p class="summary">Loading history…</p>
      <div class="buttons">
        <button class="listenBtn">▶ Listen</button>
        <button class="stop stopBtn">■ Stop</button>
        <button class="streetBtn">🧭 Street View</button>
      </div>
    `;
    listEl.appendChild(card);

    const summaryEl = card.querySelector('.summary');
    const listenBtn = card.querySelector('.listenBtn');
    const stopBtn = card.querySelector('.stopBtn');
    const streetBtn = card.querySelector('.streetBtn');
    allButtons.push(listenBtn);

    marker.on('click', () => card.scrollIntoView({ behavior: 'smooth', block: 'center' }));

    getSummary(place.title).then(text => {
      if (text) {
        summaryEl.textContent = text;
        listenBtn.disabled = false;
      } else {
        summaryEl.textContent = 'No summary available for this place.';
        listenBtn.disabled = true;
      }
    });
    listenBtn.disabled = true;

    listenBtn.addEventListener('click', () => {
      speak(summaryEl.textContent, listenBtn, allButtons);
    });
    stopBtn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      allButtons.forEach(b => b.textContent = '▶ Listen');
    });
    streetBtn.addEventListener('click', () => {
      window.open(streetViewUrl(place.lat, place.lon), '_blank');
    });
  }
}

function handlePosition(pos) {
  const { latitude, longitude } = pos.coords;
  if (!map) {
    initMap(latitude, longitude);
  } else {
    userMarker.setLatLng([latitude, longitude]);
    map.setView([latitude, longitude]);
  }
  renderPlaces(latitude, longitude);
}

function handleError(err) {
  statusEl.textContent = 'Location error: ' + err.message;
  statusEl.classList.remove('active');
}

function locate() {
  if (!navigator.geolocation) {
    statusEl.textContent = 'Geolocation not supported on this device.';
    return;
  }
  navigator.geolocation.getCurrentPosition(handlePosition, handleError, {
    enableHighAccuracy: true, timeout: 10000
  });
}

document.getElementById('locateBtn').addEventListener('click', locate);
locate();
</script>
</body>
</html>
