<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wander — Audio History Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --pink: #FF4D8D;
    --purple: #8C5CFF;
    --orange: #FF8A4C;
    --yellow: #FFC94C;
    --mint: #23D9A6;
    --blue: #4CC3FF;
    --ink: #241534;
    --ink-soft: #6b5f7f;
    --card: #ffffff;
    --bg-1: #FFEFE4;
    --bg-2: #F3E8FF;
    --bg-3: #E4F4FF;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--ink);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
  }

  header {
    padding: 20px 20px 18px;
    background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%);
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(140, 92, 255, 0.35);
  }
  header::after {
    content: "✦";
    position: absolute;
    top: 10px; right: 22px;
    font-size: 22px;
    color: rgba(255,255,255,0.55);
  }
  header::before {
    content: "✦";
    position: absolute;
    bottom: 8px; right: 60px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
  header h1 {
    margin: 0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.92);
  }

  #mapWrap {
    padding: 14px 14px 0;
  }
  #map {
    flex: 0 0 220px;
    height: 220px;
    border-radius: 22px;
    border: 4px solid #fff;
    box-shadow: 0 8px 24px rgba(140, 92, 255, 0.25);
  }

  #status {
    margin: 12px 16px 0;
    padding: 9px 16px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--purple);
    background: #fff;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    box-shadow: 0 3px 10px rgba(140,92,255,0.15);
  }
  #status.active::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 6px var(--mint);
    flex-shrink: 0;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 32px;
  }

  .place {
    background: var(--card);
    border-radius: 20px;
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: 0 6px 18px rgba(140, 92, 255, 0.14);
    border: 2px solid transparent;
    transition: transform 0.15s ease;
  }
  .place:nth-child(4n+1) { border-color: rgba(255, 77, 141, 0.18); }
  .place:nth-child(4n+2) { border-color: rgba(140, 92, 255, 0.18); }
  .place:nth-child(4n+3) { border-color: rgba(76, 195, 255, 0.18); }
  .place:nth-child(4n+4) { border-color: rgba(255, 201, 76, 0.25); }
  .place:active { transform: scale(0.98); }

  .place-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .place h2 {
    margin: 0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 17px;
    line-height: 1.3;
    color: var(--ink);
  }
  .place .dist {
    flex-shrink: 0;
    font-size: 10.5px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(120deg, var(--orange), var(--pink));
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .place p.summary {
    margin: 0 0 14px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    border: none;
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  button:active { transform: scale(0.94); }
  .listenBtn {
    background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 100%);
    color: #fff;
    box-shadow: 0 4px 12px rgba(255, 77, 141, 0.35);
  }
  .stopBtn {
    background: #F3EFFA;
    color: var(--ink-soft);
  }
  .streetBtn {
    background: linear-gradient(120deg, var(--mint) 0%, var(--blue) 100%);
    color: #fff;
    box-shadow: 0 4px 12px rgba(76, 195, 255, 0.35);
  }
  button:disabled {
    opacity: 0.4;
    cursor: default;
    box-shadow: none;
  }

  #locateBtn {
    position: fixed;
    top: 168px;
    right: 26px;
    z-index: 500;
    background: #fff;
    color: var(--purple);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    padding: 0;
    font-size: 17px;
    box-shadow: 0 6px 16px rgba(140,92,255,0.3);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d9c8ff; border-radius: 4px; }

  .leaflet-popup-content-wrapper {
    background: var(--card);
    color: var(--ink);
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
  }
  .leaflet-popup-tip { background: var(--card); }
</style>
</head>
<body>

<header>
  <h1>🌍 Wander</h1>
  <p>Snap a vibe, hear the story ✨ your pocket tour guide</p>
</header>

<div id="mapWrap"><div id="map"></div></div>
<button id="locateBtn" title="Re-center on me">📍</button>
<div id="status">Waiting for location…</div>
<div id="list"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const statusEl = document.getElementById('status');
const listEl = document.getElementById('list');
let map, userMarker;

const pinIcon = L.divIcon({
  html: '<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#FF4D8D,#8C5CFF);transform:rotate(-45deg);box-shadow:0 3px 8px rgba(140,92,255,0.4);border:2px solid white;"></div>',
  className: '', iconSize: [26,26], iconAnchor: [13,26]
});

// --- Map setup ---
function initMap(lat, lon) {
  map = L.map('map', { zoomControl: false }).setView([lat, lon], 16);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);
  userMarker = L.circleMarker([lat, lon], {
    radius: 8, color: '#8C5CFF', fillColor: '#FF4D8D', fillOpacity: 1, weight: 3
  }).addTo(map).bindPopup('You are here ✨');
}

// --- Distance helper (meters) ---
function distMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// --- Wikipedia: find nearby geotagged pages ---
async function findNearbyPlaces(lat, lon) {
  const url = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=2000&gslimit=15&format=json&origin=*`;
  const res = await fetch(url);
  const data = await res.json();
  return data.query.geosearch;
}

// --- Wikipedia: get a plain-text summary for a page ---
async function getSummary(title) {
  const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  return data.extract || null;
}

// --- Google Street View link (no API key needed) ---
function streetViewUrl(lat, lon) {
  return `https://www.google.com/maps?layer=c&cbll=${lat},${lon}`;
}

function speak(text, btn, allButtons) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95;
  allButtons.forEach(b => b.textContent = '▶ Listen');
  btn.textContent = '⏸ Playing…';
  utter.onend = () => { btn.textContent = '▶ Listen'; };
  window.speechSynthesis.speak(utter);
}

async function renderPlaces(lat, lon) {
  statusEl.textContent = '🔎 Searching nearby history…';
  statusEl.classList.add('active');
  let places;
  try {
    places = await findNearbyPlaces(lat, lon);
  } catch (e) {
    statusEl.textContent = 'Could not reach Wikipedia. Check your connection.';
    statusEl.classList.remove('active');
    return;
  }

  if (!places.length) {
    statusEl.textContent = 'Nothing notable found within 2km. Try moving around 👀';
    statusEl.classList.remove('active');
    listEl.innerHTML = '';
    return;
  }

  statusEl.textContent = `✨ Found ${places.length} nearby spots`;
  listEl.innerHTML = '';
  const allButtons = [];

  for (const place of places) {
    const d = Math.round(distMeters(lat, lon, place.lat, place.lon));

    const marker = L.marker([place.lat, place.lon], { icon: pinIcon }).addTo(map).bindPopup(place.title);

    const card = document.createElement('div');
    card.className = 'place';
    card.innerHTML = `
      <div class="place-head">
        <h2>${place.title}</h2>
        <span class="dist">${d}m</span>
      </div>
      <p class="summary">Loading history…</p>
      <div class="buttons">
        <button class="listenBtn">▶ Listen</button>
        <button class="stop stopBtn">■ Stop</button>
        <button class="streetBtn">🧭 Street View</button>
      </div>
    `;
    listEl.appendChild(card);

    const summaryEl = card.querySelector('.summary');
    const listenBtn = card.querySelector('.listenBtn');
    const stopBtn = card.querySelector('.stopBtn');
    const streetBtn = card.querySelector('.streetBtn');
    allButtons.push(listenBtn);

    marker.on('click', () => card.scrollIntoView({ behavior: 'smooth', block: 'center' }));

    getSummary(place.title).then(text => {
      if (text) {
        summaryEl.textContent = text;
        listenBtn.disabled = false;
      } else {
        summaryEl.textContent = 'No summary available for this place.';
        listenBtn.disabled = true;
      }
    });
    listenBtn.disabled = true;

    listenBtn.addEventListener('click', () => {
      speak(summaryEl.textContent, listenBtn, allButtons);
    });
    stopBtn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      allButtons.forEach(b => b.textContent = '▶ Listen');
    });
    streetBtn.addEventListener('click', () => {
      window.open(streetViewUrl(place.lat, place.lon), '_blank');
    });
  }
}

function handlePosition(pos) {
  const { latitude, longitude } = pos.coords;
  if (!map) {
    initMap(latitude, longitude);
  } else {
    userMarker.setLatLng([latitude, longitude]);
    map.setView([latitude, longitude]);
  }
  renderPlaces(latitude, longitude);
}

function handleError(err) {
  statusEl.textContent = 'Location error: ' + err.message;
  statusEl.classList.remove('active');
}

function locate() {
  if (!navigator.geolocation) {
    statusEl.textContent = 'Geolocation not supported on this device.';
    return;
  }
  navigator.geolocation.getCurrentPosition(handlePosition, handleError, {
    enableHighAccuracy: true, timeout: 10000
  });
}

document.getElementById('locateBtn').addEventListener('click', locate);
locate();
</script>
</body>
</html>
